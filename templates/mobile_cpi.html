                </div>

            <div id="paginationControls" style="display: none; margin-top: 30px; text-align: center;">

                <button onclick="goToPage(currentPage - 1)" id="prevPage" style="padding: 10px 15px; margin: 0 5px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600;">Previous</button>
                <span id="pageInfo" style="margin: 0 15px; font-weight: 600; color: #333;"></span>

                <button onclick="goToPage(totalPages)" id="lastPage" style="padding: 10px 15px; margin: 0 5px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600;">Last</button>

    <script>
        
        
        // AI Search with Smart Fallback
        async function performAISearch() {
            const query = document.getElementById('searchQuery').value.trim();
            
            if (!query) {
                alert('Please enter a search term');
                return;
            }
            
            // Show AI response window
            const aiWindow = document.getElementById('aiResponseWindow');
            const aiText = document.getElementById('aiResponseText');
            const aiStatus = document.getElementById('aiResponseStatus');
            
            if (aiWindow) aiWindow.style.display = 'block';
            if (aiText) aiText.textContent = 'Searching for the best phones...';
            if (aiStatus) aiStatus.style.display = 'block';
            
            // Parse query for search term and budget
            const parsed = parseNaturalQuery(query);
            
            // Hide AI status after parsing
            if (aiStatus) aiStatus.style.display = 'none';
            if (aiText) aiText.textContent = `Searching for "${parsed.searchTerm}"${parsed.budget ? ' under Rs.' + parsed.budget : ''}...`;
            
            // Call search with parsed parameters
            await searchMobilesWithParams(parsed.searchTerm, parsed.budget);
        }
        
        // Parse natural language query
        function parseNaturalQuery(query) {
            const lowerQuery = query.toLowerCase();
            let budget = null;
            
            // Extract budget patterns
            const budgetPatterns = [
                /under\s+(\d+)k/i,
                /under\s+(\d+)/i,
                /below\s+(\d+)k/i,
                /below\s+(\d+)/i,
                /budget\s+(\d+)k/i,
                /budget\s+(\d+)/i,
                /around\s+(\d+)k/i,
                /around\s+(\d+)/i,
                /(\d+)k\s+budget/i,
                /(\d+)\s+budget/i
            ];
            
            for (const pattern of budgetPatterns) {
                const match = query.match(pattern);
                if (match) {
                    budget = parseInt(match[1]);
                    if (pattern.source.includes('k')) {
                        budget = budget * 1000;
                    }
                    break;
                }
            }
            
            // Extract search term (remove budget-related words)
            let searchTerm = query
                .replace(/under\s+\d+k?/i, '')
                .replace(/below\s+\d+k?/i, '')
                .replace(/budget\s+\d+k?/i, '')
                .replace(/\d+k?\s+budget/i, '')
                .replace(/around\s+\d+k?/i, '')
                .trim() || 'phone';
            
            return { searchTerm, budget };
        }
        
        // Search with parsed parameters
        async function searchMobilesWithParams(searchQuery, maxBudget) {
            showLoading('Searching mobile phones...');
            
            // Store search params for sorting
            currentSearchParams = {
                query: searchQuery,
                page: 1,
                per_page: 20,
                price_min: 0,
                price_max: maxBudget || 999999,
                min_cpi: 0,
                max_results: 100
            };
            
            try {
                const response = await fetch('/api/mobile/search', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(currentSearchParams)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    displayResults(data.results, `Search Results for "${searchQuery}"`, data.page || 1, data.total_pages || 1);
                    
                    // Update pagination if available
                    if (data.page && data.total_pages) {
                        updatePaginationButtons(data.page, data.total_pages);
                    }
                    
                    // Update AI response
                    const aiText = document.getElementById('aiResponseText');
                    if (aiText) {
                        aiText.textContent = `Found ${data.total_results || data.results.length} phones matching "${searchQuery}"${maxBudget ? ' under Rs.' + maxBudget.toLocaleString() : ''}`;
                    }
                } else {
                    showError(data.error || 'Search failed');
                }
            } catch (error) {
                showError('Network error: ' + error.message);
            }
        }
        
        async function searchMobiles() {
            const query = document.getElementById('searchQuery').value;
            const minPrice = document.getElementById('minPrice').value || 0;
            const maxPrice = document.getElementById('maxPrice').value || 999999;
            const minCPI = document.getElementById('minCPI').value || 0;
            
            if (!query.trim()) {
                alert('Please enter a search query');
                return;
            }
            
            showLoading('Searching mobile phones...');
            
            try {
                const response = await fetch('/api/mobile/search', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        query: query,
                        max_results: 20,
                        price_min: parseFloat(minPrice),
                        price_max: parseFloat(maxPrice),
                        min_cpi: parseFloat(minCPI)
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    displayResults(data.results, `Search Results for "${query}"`, data.page || 1, data.total_pages || 1);
                    if (data.page && data.total_pages) {
                        updatePaginationButtons(data.page, data.total_pages);
                    }
                } else {
                    showError(data.error || 'Search failed');
                }
            } catch (error) {
                showError('Network error: ' + error.message);
            }
        }
        
        async function getTopCPIPhones() {
            currentSearchParams = {
                query: 'phone',
                page: 1,
                per_page: 20,
                sort_by: 'overall_cpi',
                sort_order: 'desc',
                price_min: 0,
                price_max: 999999,
                min_cpi: 0,
                max_results: 100
            };
            
            performSearchWithPagination(currentSearchParams);
        }
        
        async function getBestValuePhones() {
            currentSearchParams = {
                query: 'phone',
                page: 1,
                per_page: 20,
                sort_by: 'price_value_ratio',
                sort_order: 'desc',
                price_min: 0,
                price_max: 999999,
                min_cpi: 0,
                max_results: 100
            };
            
            performSearchWithPagination(currentSearchParams);
        }
        
        async function getStats() {
            try {
                const response = await fetch('/api/mobile/stats');
                const data = await response.json();
                
                if (data.success) {
                    // Hide results and sorting when showing stats
                    const resultsContainer = document.getElementById('resultsContainer');
                    const sortingControls = document.getElementById('sortingControls');
                    if (resultsContainer) resultsContainer.style.display = 'none';
                    if (sortingControls) sortingControls.style.display = 'none';
                    
                    displayStats(data.stats);
                } else {
                    showError(data.error || 'Failed to load statistics');
                }
            } catch (error) {
                showError('Network error: ' + error.message);
            }
        }
        
        function displayResults(results, title, page, totalPages) {
            const container = document.getElementById('resultsContainer');
            
            // Hide stats section when showing results
            const statsSection = document.getElementById('statsSection');
            if (statsSection) statsSection.style.display = 'none';
            
            // Show results container
            if (container) container.style.display = 'block';
            
            if (!results || results.length === 0) {
                container.innerHTML = `
                    <div class="loading">
                        <p>No mobile phones found matching your criteria</p>
                    </div>
                `;
                return;
            }
            
            // Create heading with inline pagination controls
            let html = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;">
                    <h2 style="margin: 0;">${title} (Page ${page} of ${totalPages}) (${results.length} phones)</h2>`;
            
            // Add pagination controls inline if there are multiple pages
            if (totalPages && totalPages > 1) {
                html += `
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <button onclick="goToPage(1)" id="firstPage" style="padding: 8px 12px; background: #667eea; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px;">First</button>
                        <button onclick="goToPage(${page - 1})" id="prevPage" style="padding: 8px 12px; background: #667eea; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px;">Prev</button>
                        <span style="font-weight: 600; color: #333; font-size: 14px;">Page ${page} of ${totalPages}</span>
                        <button onclick="goToPage(${page + 1})" id="nextPage" style="padding: 8px 12px; background: #667eea; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px;">Next</button>
                        <button onclick="goToPage(${totalPages})" id="lastPage" style="padding: 8px 12px; background: #667eea; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px;">Last</button>
                    </div>`;
            }
            
            html += `</div>`;
            
            results.forEach(phone => {
                const cpi = phone.cpi_scores;
                
                
                const googleShoppingUrl = `https://www.google.com/search?tbm=shop&q=${encodeURIComponent(phone.name)}`;
                
                html += `
                    <div class="phone-card">
                        <div class="phone-header">
                            <div class="phone-info">
                                <h3>${phone.name}</h3>
                                <div class="phone-brand">${phone.brand}</div>
                            </div>
                            <div class="phone-price">Rs.${phone.price.toLocaleString()}</div>
                        </div>
                        
                        <div class="cpi-scores">
                            <div class="cpi-item cpi-overall">
                                <div class="cpi-label">Overall CPI</div>
                                <div class="cpi-score">${cpi.overall_cpi}</div>
                            </div>
                            <div class="cpi-item">
                                <div class="cpi-label">Processor</div>
                                <div class="cpi-score">${cpi.processor_score}</div>
                            </div>
                            <div class="cpi-item">
                                <div class="cpi-label">Display</div>
                                <div class="cpi-score">${cpi.display_score}</div>
                            </div>
                            <div class="cpi-item">
                                <div class="cpi-label">Camera</div>
                                <div class="cpi-score">${cpi.camera_score}</div>
                            </div>
                            <div class="cpi-item">
                                <div class="cpi-label">Battery</div>
                                <div class="cpi-score">${cpi.battery_score}</div>
                            </div>
                            <div class="cpi-item">
                                <div class="cpi-label">Storage</div>
                                <div class="cpi-score">${cpi.storage_score}</div>
                            </div>
                            <div class="cpi-item">
                                <div class="cpi-label">Value Ratio</div>
                                <div class="cpi-score">${cpi.price_value_ratio}</div>
                            </div>
                        </div>
                        
                        <div class="specs-summary">
                            <div class="specs-grid">
                                <div class="spec-item">
                                    <span class="spec-label">Processor:</span> ${phone.processor || 'N/A'}
                                </div>
                                <div class="spec-item">
                                    <span class="spec-label">Storage:</span> ${phone.storage || 'N/A'}
                                </div>
                                <div class="spec-item">
                                    <span class="spec-label">Battery:</span> ${phone.battery || 'N/A'}
                                </div>
                                <div class="spec-item">
                                    <span class="spec-label">Display:</span> ${phone.display || 'N/A'}
                                </div>
                                <div class="spec-item">
                                    <span class="spec-label">Camera:</span> ${phone.camera || 'N/A'}
                                </div>
                            </div>
                        </div>
                        
                        <a href="${googleShoppingUrl}" target="_blank" style="display: inline-block; margin-top: 15px; padding: 10px 20px; background: #4285f4; color: white; text-decoration: none; border-radius: 8px; font-weight: 600; text-align: center; transition: background 0.2s;">
                             View on Google Shopping
                        </a>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            
            // Show sorting controls when results are displayed
            const sortingControls = document.getElementById('sortingControls');
            if (sortingControls) {
                sortingControls.style.display = 'block';
            }
        }
        
        function displayStats(stats) {
            const statsSection = document.getElementById('statsSection');
            const statsContent = document.getElementById('statsContent');
            
            let html = `
                <div class="stat-item">
                    <div class="stat-value">${stats.total_phones}</div>
                    <div class="stat-label">Total Phones</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">${stats.avg_cpi_score}</div>
                    <div class="stat-label">Avg CPI Score</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">${stats.max_cpi_score}</div>
                    <div class="stat-label">Max CPI Score</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">${stats.avg_price.toLocaleString()}</div>
                    <div class="stat-label">Avg Price</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">${stats.price_ranges.budget}</div>
                    <div class="stat-label">Budget Phones</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">${stats.price_ranges.premium}</div>
                    <div class="stat-label">Premium Phones</div>
                </div>
            `;
            
            statsContent.innerHTML = html;
            if (statsSection) statsSection.style.display = 'block';
        }
        
        function showLoading(message) {
            const container = document.getElementById('resultsContainer');
            if (container) {
                container.innerHTML = `
                    <div class="loading">
                        <p>${message}</p>
                    </div>
                `;
            } else {
                console.error('resultsContainer element not found');
            }
        }
        
        function showError(message) {
            const container = document.getElementById('resultsContainer');
            if (container) {
                container.innerHTML = `
                    <div class="error">
                        <p> ${message}</p>
                    </div>
                `;
            } else {
                console.error('resultsContainer element not found');
            }
        }
        
        // Load top phones on page load OR handle URL parameters
        window.addEventListener('load', function() {
            // Setup Enter key listener after DOM is loaded
            const searchInput = document.getElementById('searchQuery');
            if (searchInput) {
                searchInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        performAISearch();
                    }
                });
            }
            
            // Check for URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('query');
            const budget = urlParams.get('budget');
            
            if (query) {
                // Auto-populate search box with the query as-is (already contains all specs)
                document.getElementById('searchQuery').value = query;
                console.log('Loading with query from URL:', query);
                
                // Auto-trigger AI search
                performAISearch();
            } else {
                // Default: show top CPI phones
                getTopCPIPhones();
            }
        });

        // Pagination state
        let currentPage = 1;
        let totalPages = 1;
        let currentSearchParams = {};

        // Apply sorting - uses main page logic
        function applySorting() {
            const sortBy = document.getElementById('sortBy').value;
            let sortField = sortBy;
            let sortOrder = 'desc';
            
            console.log('Sorting by:', sortBy);
            
            if (sortBy === 'price_low') {
                sortField = 'price';
                sortOrder = 'asc';
            } else if (sortBy === 'price_high') {
                sortField = 'price';
                sortOrder = 'desc';
            }
            
            // Ensure currentSearchParams is initialized with required fields
            if (!currentSearchParams || !currentSearchParams.query) {
                currentSearchParams = {
                    query: 'phone',
                    page: 1,
                    per_page: 20,
                    price_min: 0,
                    price_max: 999999,
                    min_cpi: 0,
                    max_results: 100
                };
            }
            
            currentSearchParams.sort_by = sortField;
            currentSearchParams.sort_order = sortOrder;
            currentPage = 1;
            currentSearchParams.page = 1;
            performSearchWithPagination(currentSearchParams);
        }

        // Go to page
        function goToPage(page) {
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            currentSearchParams.page = page;
            performSearchWithPagination(currentSearchParams);
        }

        // Perform search with pagination
        async function performSearchWithPagination(params) {
            showLoading('Loading results...');
            
            // Store params for sorting
            currentSearchParams = params;
            
            try {
                const response = await fetch('/api/mobile/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(params)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    displayResults(data.results, 'Search Results', data.page, data.total_pages);
                    updatePaginationButtons(data.page, data.total_pages);
                    const sortingControls = document.getElementById('sortingControls');
                    if (sortingControls) sortingControls.style.display = 'block';
                } else {
                    showError(data.error || 'Search failed');
                }
            } catch (error) {
                showError('Network error: ' + error.message);
            }
        }

        // Update pagination button states
        function updatePaginationButtons(page, pages) {
            currentPage = page;
            totalPages = pages;
            
            const firstPage = document.getElementById('firstPage');
            const prevPage = document.getElementById('prevPage');
            const nextPage = document.getElementById('nextPage');
            const lastPage = document.getElementById('lastPage');
            
            if (firstPage) {
                firstPage.disabled = (page === 1);
                firstPage.style.opacity = (page === 1) ? '0.5' : '1';
                firstPage.style.cursor = (page === 1) ? 'not-allowed' : 'pointer';
            }
            
            if (prevPage) {
                prevPage.disabled = (page === 1);
                prevPage.style.opacity = (page === 1) ? '0.5' : '1';
                prevPage.style.cursor = (page === 1) ? 'not-allowed' : 'pointer';
            }
            
            if (nextPage) {
                nextPage.disabled = (page === pages);
                nextPage.style.opacity = (page === pages) ? '0.5' : '1';
                nextPage.style.cursor = (page === pages) ? 'not-allowed' : 'pointer';
            }
            
            if (lastPage) {
                lastPage.disabled = (page === pages);
                lastPage.style.opacity = (page === pages) ? '0.5' : '1';
                lastPage.style.cursor = (page === pages) ? 'not-allowed' : 'pointer';
            }
        }


        // Interactive Chat Functions
        let chatHistory = [];
        
        function clearAIChat() {
            chatHistory = [];
            const aiChatMessages = document.getElementById('aiChatMessages');
            const aiResponseText = document.getElementById('aiResponseText');
            if (aiResponseText) {
                aiResponseText.textContent = '';
            }
            if (aiChatMessages) {
                aiChatMessages.innerHTML = '<div id="aiResponseText" style="margin: 0; color: white; font-weight: 500; font-size: 15px; padding: 12px; background: rgba(255,255,255,0.15); border-radius: 8px; margin-bottom: 10px;"></div>';
            }
        }
        
        function addChatMessage(message, isUser = false) {
            chatHistory.push({ message, isUser, timestamp: new Date() });
            const aiChatMessages = document.getElementById('aiChatMessages');
            if (!aiChatMessages) return;
            
            const messageDiv = document.createElement('div');
            messageDiv.style.cssText = `
                margin-bottom: 10px;
                padding: 12px;
                border-radius: 8px;
                ${isUser ? 
                    'background: rgba(255,255,255,0.25); color: white; text-align: right;' : 
                    'background: rgba(255,255,255,0.15); color: white;'}
            `;
            messageDiv.textContent = message;
            aiChatMessages.appendChild(messageDiv);
            aiChatMessages.scrollTop = aiChatMessages.scrollHeight;
        }
        
        async function askAI(question) {
            const aiFollowUpInput = document.getElementById('aiFollowUpInput');
            if (aiFollowUpInput) {
                aiFollowUpInput.value = question;
            }
            await sendAIFollowUp();
        }
        
        async function sendAIFollowUp() {
            const input = document.getElementById('aiFollowUpInput');
            const question = input.value.trim();
            
            if (!question) return;
            
            // Add user message to chat
            addChatMessage(question, true);
            input.value = '';
            
            // Show thinking status
            const aiStatus = document.getElementById('aiResponseStatus');
            if (aiStatus) {
                aiStatus.style.display = 'block';
                aiStatus.innerHTML = '<span></span> Thinking...';
            }
            
            try {
                // Get current search context
                const context = {
                    currentQuery: currentSearchParams?.query || '',
                    budget: currentSearchParams?.price_max || 0,
                    chatHistory: chatHistory.slice(-5) // Last 5 messages for context
                };
                
                const response = await fetch('/api/ai/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: question,
                        context: context
                    })
                });
                
                const data = await response.json();
                
                if (aiStatus) aiStatus.style.display = 'none';
                
                if (data.success) {
                    // Add AI response to chat
                    addChatMessage(data.response);
                    
                    // If AI suggests a new search, perform it
                    if (data.action === 'search' && data.params) {
                        setTimeout(() => {
                            if (data.params.query) {
                                currentSearchParams = {
                                    ...currentSearchParams,
                                    ...data.params,
                                    page: 1
                                };
                                performSearchWithPagination(currentSearchParams);
                            }
                        }, 500);
                    }
                } else {
                    addChatMessage('Sorry, I encountered an error. Please try again.');
                }
            } catch (error) {
                if (aiStatus) aiStatus.style.display = 'none';
                addChatMessage('Network error. Please check your connection and try again.');
            }
        }
        
    </script>
</body>
</html>
